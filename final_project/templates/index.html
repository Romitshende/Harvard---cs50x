{% extends "layout.html" %}

{% block main %}
<style>
    .upload-zone {
        border: 2px dashed #cbd5e1;
        background-color: #ffffff;
        border-radius: 20px;
        transition: all 0.2s ease;
        cursor: pointer;
    }
    .upload-zone:hover {
        border-color: var(--brand-primary);
        background-color: var(--brand-light);
    }
    .hero-title {
        font-weight: 800;
        letter-spacing: -1px;
        color: #0f172a;
    }
</style>

<div class="row justify-content-center align-items-center my-5">
    <div class="col-xl-7 col-lg-8 text-center">
        <div class="mb-4">
            <span class="badge text-success border border-success-subtle px-3 py-2 rounded-pill fw-semibold text-uppercase tracking-wider small mb-3" style="background-color: var(--brand-light);">Automated Statistics Engine</span>
            <h1 class="display-5 hero-title mb-3">Turn Complex Datasets into Clear Insights</h1>
            <p class="text-muted fs-5 max-w-2xl mx-auto">Drop your tabular records below. Our framework instantly evaluates metrics, structure variables, and data layouts without screen clutter.</p>
        </div>

        <div class="card card-premium text-start border-0 shadow-sm mt-4">
            <div class="card-body p-4 p-md-5">
                <form action="/" method="post" enctype="multipart/form-data" id="uploadForm">
                    <div class="mb-4">
                        <label for="file" class="upload-zone d-block p-5 text-center" id="dropZone">
                            <div class="py-3">
                                <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" class="mb-3 mx-auto d-block" style="color: var(--brand-primary) !important;">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" />
                                </svg>
                                <h5 class="fw-bold text-dark mb-1">Select your CSV data document</h5>
                                <p class="text-muted small mb-0">Standard comma-separated format assets up to 16MB</p>
                            </div>
                            <input class="form-control d-none" type="file" id="file" name="file" accept=".csv" required>
                        </label>
                    </div>

                    <div id="filePreview" class="d-none alert alert-light border border-light-subtle d-flex align-items-center justify-content-between rounded-3 p-3 mb-4">
                        <div class="d-flex align-items-center gap-2">
                            <span class="fs-4">📄</span>
                            <div>
                                <div class="fw-bold text-dark small" id="fileNameDisplay">dataset.csv</div>
                                <div class="text-muted min-small" id="fileSizeDisplay">0 KB</div>
                            </div>
                        </div>
                        <span class="badge bg-success-subtle text-success rounded-pill px-2.5 py-1 small">Ready</span>
                    </div>

                    <button type="submit" class="btn btn-premium w-100 py-3 text-white shadow-sm d-flex align-items-center justify-content-center gap-2" style="background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary)); border: none;">
                        <span>Process & Analyze Workspace</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7m0 0l-7 7m7-7H6" />
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file');
    const dropZone = document.getElementById('dropZone');
    const filePreview = document.getElementById('filePreview');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const fileSizeDisplay = document.getElementById('fileSizeDisplay');

    fileInput.addEventListener('change', function(e) {
        if(this.files && this.files[0]) {
            const file = this.files[0];
            fileNameDisplay.textContent = file.name;
            fileSizeDisplay.textContent = (file.size / 1024).toFixed(1) + ' KB';
            filePreview.classList.remove('d-none');
            dropZone.style.borderColor = 'var(--brand-primary)';
            dropZone.style.backgroundColor = 'var(--brand-light)';
        }
    });
</script>
{% endblock %}
